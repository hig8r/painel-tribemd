<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Escala — Presencial e Home Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4FB; --surface:#FFFFFF; --surface2:#F3F0FA;
    --border:#E9E3F6; --border2:#DAD0EE;
    --text:#1F1433; --muted:#6B5E80; --muted2:#9C90B0;
    --accent:#5213B9; --accent3:#3D0E8A;
    --home-bg:#F1ECF9; --home-fg:#6B5E80;
    --shadow:0 1px 2px rgba(82,19,185,.07),0 1px 3px rgba(82,19,185,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 20px 64px}

  header.top{display:flex;align-items:center;justify-content:space-between;
    padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px;flex-wrap:wrap;gap:16px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:40px;height:40px;border-radius:11px;background:var(--accent3);
    display:grid;place-items:center;color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:18px}
  .logo-img{height:38px;width:auto;display:block}
  .brand h1{font-family:'Space Grotesk';font-size:18px;font-weight:600;letter-spacing:-.01em}
  .brand p{font-size:13px;color:var(--muted);margin-top:1px}
  .legend-toggle{display:flex;gap:8px}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:18px 18px 16px;box-shadow:var(--shadow)}
  .stat .num{font-family:'Space Grotesk';font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em}
  .stat .lbl{font-size:12px;color:var(--muted);margin-top:7px;text-transform:uppercase;letter-spacing:.04em}
  .stat.accent .num{color:var(--accent3)}

  /* cargo filter */
  .cargo-filter{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;align-items:center}
  .cargo-chip{padding:6px 13px;border-radius:999px;border:1px solid var(--border2);
    background:var(--surface);font-size:13px;font-weight:500;color:var(--muted);
    cursor:pointer;transition:all .15s;font-family:inherit}
  .cargo-chip:hover{border-color:var(--accent);color:var(--accent)}
  .cargo-chip.active{background:var(--accent3);border-color:var(--accent3);color:#fff}
  .cargo-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;
    background:var(--surface2);color:var(--muted);margin-left:6px;white-space:nowrap}

  /* day tabs */
  .tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
  .tab{padding:9px 18px;border-radius:11px;border:1px solid var(--border2);background:var(--surface);
    font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
  .tab:hover{border-color:var(--accent);color:var(--accent)}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;
    box-shadow:0 2px 8px rgba(82,19,185,.28)}
  .tab .count{font-size:11px;opacity:.7;margin-left:5px}

  /* cargo filter chips */
  .cargo-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;align-items:center}
  .cargo-filter .flbl{font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin-right:2px}
  .chip{padding:6px 14px;border-radius:999px;border:1px solid var(--border2);
    background:var(--surface);font-size:13px;font-weight:500;color:var(--muted);
    cursor:pointer;transition:all .15s;font-family:inherit}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.active{background:#EBE3FA;border-color:var(--accent);color:var(--accent3);font-weight:600}
  .role-badge{font-size:10px;padding:2px 7px;border-radius:999px;margin-left:auto;
    background:var(--surface2);color:var(--muted);font-weight:600;white-space:nowrap}

  /* two columns: presencial mesas + home office */
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:20px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow)}
  .panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;
    align-items:center;justify-content:space-between;background:var(--surface2)}
  .panel-head h2{font-family:'Space Grotesk';font-size:15px;font-weight:600}
  .panel-head .pill{font-size:12px;padding:3px 10px;border-radius:999px;font-weight:600}
  .pill-pres{background:#EBE3FA;color:var(--accent3)}
  .pill-home{background:var(--home-bg);color:var(--home-fg)}

  /* mesa rows */
  .mesas{padding:8px}
  .mesa-row{display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:11px;
    transition:background .12s}
  .mesa-row:hover{background:var(--surface2)}
  .mesa-tag{font-family:'Space Grotesk';font-size:12px;font-weight:600;color:var(--muted);
    width:62px;flex-shrink:0;letter-spacing:.02em}
  .person{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    font-size:13px;font-weight:600;color:#fff;font-family:'Space Grotesk';flex-shrink:0}
  .person .pname{font-size:14px;font-weight:500}
  .mesa-empty{color:var(--muted2);font-size:13px;font-style:italic}

  /* home office list */
  .home-list{padding:14px;display:flex;flex-direction:column;gap:8px}
  .home-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;
    background:var(--home-bg)}
  .home-item .avatar{opacity:.85}
  .home-item .pname{font-size:14px;font-weight:500;color:var(--home-fg)}
  .home-icon{margin-left:auto;font-size:12px;color:var(--muted2)}

  /* people summary table */
  .summary{margin-top:28px;background:var(--surface);border:1px solid var(--border);
    border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
  .summary .panel-head{cursor:default}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    background:var(--surface2);font-weight:600}
  tr:last-child td{border-bottom:none}
  td.name-cell{display:flex;align-items:center;gap:10px;font-weight:500}
  .day-dot{display:inline-flex;align-items:center;justify-content:center;width:30px;height:24px;
    border-radius:7px;font-size:11px;font-weight:600;margin-right:3px}
  .day-on{background:#EBE3FA;color:var(--accent3)}
  .day-off{background:var(--home-bg);color:var(--muted2)}

  @media(max-width:860px){
    .grid2{grid-template-columns:1fr}
    .stats{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:520px){
    .stats{grid-template-columns:1fr 1fr}
    .summary{overflow-x:auto}
  }
</style>
</head>

      <div>
        <h1>Painel de Escala</h1>
        <p>Controle de dias presenciais e home office</p>
      </div>
    </div>
  </header>

  <section class="stats" id="stats"></section>

  <nav class="tabs" id="tabs"></nav>

  <div class="cargo-filter" id="cargoFilter"></div>

  <div class="grid2">
    <div class="panel">
      <div class="panel-head">
        <h2>Presencial — Mesas ocupadas</h2>
        <span class="pill pill-pres" id="presCount"></span>
      </div>
      <div class="mesas" id="mesas"></div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <h2>Home office</h2>
        <span class="pill pill-home" id="homeCount"></span>
      </div>
      <div class="home-list" id="home"></div>
    </div>
  </div>

  <div class="summary">
    <div class="panel-head"><h2>Resumo semanal por pessoa</h2></div>
    <table id="summaryTable"></table>
  </div>
</div>

<script>
const DIAS = ['Segunda','Terca','Quarta','Quinta','Sexta'];
const DIAS_LABEL = {Segunda:'Segunda',Terca:'Terça',Quarta:'Quarta',Quinta:'Quinta',Sexta:'Sexta'};
const DIAS_CURTO = {Segunda:'Seg',Terca:'Ter',Quarta:'Qua',Quinta:'Qui',Sexta:'Sex'};

// Escala fixa de mesas (replicada do PDF). Posicao do array = numero da mesa.
const ESCALA = {
  Segunda: ['Vini','Diego','Mira','Eric','Dalton','Beatriz','Victor','Levi'],
  Terca:   ['Vini','Higor','Ale','Eric','Dalton','Beatriz','Yohana','Jean'],
  Quarta:  ['Diego','Renan','Victor','Ale','Higor','Yohana','Jean'],
  Quinta:  ['Vini','Diego','Mira','Renan','Ale','Jean','Yohana','Levi'],
  Sexta:   ['Higor','Mira','Eric','Dalton','Beatriz','Renan','Levi','Victor'],
};

const TODOS = [...new Set(Object.values(ESCALA).flat())].sort();

// Cargo de cada pessoa
const CARGO = {
  Diego: 'Dados', Dalton: 'UX/UI', Beatriz: 'UX/UI', Vini: 'Coordenador',
  Victor: 'QA', Higor: 'QA',
  Levi: 'Fullstack', Jean: 'Fullstack', Mira: 'Fullstack', Eric: 'Fullstack', Renan: 'Fullstack',
  Ale: 'Front-end', Yohana: 'Mobile',
};
TODOS.forEach(p => { if(!CARGO[p]) CARGO[p] = 'DEV'; });
const CARGOS = ['Todos', ...[...new Set(TODOS.map(p => CARGO[p]))].sort()];
let cargoAtivo = 'Todos';
const noCargo = p => cargoAtivo === 'Todos' || CARGO[p] === cargoAtivo;

// Cor estavel por pessoa
const PALETTE = ['#5213B9','#7C3AED','#9333EA','#6D28D9','#4C1D95','#8B5CF6',
  '#A855F7','#5B21B6','#7E22CE','#6366F1','#4338CA','#9D4EDD','#3D0E8A'];
const corDe = {};
TODOS.forEach((p,i)=> corDe[p] = PALETTE[i % PALETTE.length]);
const iniciais = p => p.slice(0,2).toUpperCase();

let diaAtivo = 'Segunda';

function avatar(p){
  return `<span class="avatar" style="background:${corDe[p]}">${iniciais(p)}</span>`;
}

function renderCargoFilter(){
  document.getElementById('cargoFilter').innerHTML = CARGOS.map(c=>
    `<button class="cargo-chip ${c===cargoAtivo?'active':''}" data-cargo="${c}">${c}</button>`
  ).join('');
  document.querySelectorAll('.cargo-chip').forEach(b=>{
    b.onclick = ()=>{ cargoAtivo = b.dataset.cargo; renderCargoFilter(); renderDia(); renderSummary(); };
  });
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = DIAS.map(d=>{
    const n = ESCALA[d].length;
    return `<button class="tab ${d===diaAtivo?'active':''}" data-dia="${d}">
      ${DIAS_LABEL[d]}<span class="count">${n}</span></button>`;
  }).join('');
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{ diaAtivo = t.dataset.dia; renderDia(); renderTabs(); };
  });
}

function renderStats(){
  const time = TODOS.filter(noCargo);
  const presentes = ESCALA[diaAtivo].filter(noCargo);
  const totalPres = presentes.length;
  const totalHome = time.length - totalPres;
  const somaDias = DIAS.reduce((a,d)=> a + ESCALA[d].filter(noCargo).length, 0);
  const mediaPres = (somaDias/DIAS.length).toFixed(1);
  const sufixo = cargoAtivo==='Todos' ? '' : ' · '+cargoAtivo;
  document.getElementById('stats').innerHTML = `
    <div class="stat accent"><div class="num">${time.length}</div><div class="lbl">Pessoas${sufixo||' no time'}</div></div>
    <div class="stat"><div class="num">${totalPres}</div><div class="lbl">Presencial — ${DIAS_LABEL[diaAtivo]}</div></div>
    <div class="stat"><div class="num">${totalHome}</div><div class="lbl">Home office — ${DIAS_LABEL[diaAtivo]}</div></div>
    <div class="stat"><div class="num">${mediaPres}</div><div class="lbl">Média presencial/dia</div></div>`;
}

function renderDia(){
  renderStats();
  const presentes = ESCALA[diaAtivo].filter(noCargo);
  const presIdx = ESCALA[diaAtivo]; // para manter o numero da mesa original
  // mesas
  document.getElementById('mesas').innerHTML = presentes.length
    ? presentes.map(p=>`
      <div class="mesa-row">
        <span class="mesa-tag">Mesa ${presIdx.indexOf(p)+1}</span>
        <div class="person">${avatar(p)}<span class="pname">${p}</span><span class="cargo-badge">${CARGO[p]}</span></div>
      </div>`).join('')
    : `<p class="mesa-empty" style="padding:8px">Ninguém deste cargo presencial neste dia.</p>`;
  document.getElementById('presCount').textContent = presentes.length + ' presentes';

  // home office = time (filtrado) menos presentes
  const home = TODOS.filter(p=>noCargo(p) && !ESCALA[diaAtivo].includes(p));
  document.getElementById('home').innerHTML = home.length
    ? home.map(p=>`<div class="home-item">${avatar(p)}<span class="pname">${p}</span><span class="cargo-badge">${CARGO[p]}</span><span class="home-icon">home</span></div>`).join('')
    : `<p class="mesa-empty" style="padding:8px">Todos presenciais neste dia.</p>`;
  document.getElementById('homeCount').textContent = home.length + ' em casa';
}

function renderSummary(){
  let head = '<thead><tr><th>Pessoa</th><th>Cargo</th>';
  DIAS.forEach(d=> head += `<th>${DIAS_CURTO[d]}</th>`);
  head += '<th>Presencial</th><th>Home</th></tr></thead>';
  let body = '<tbody>';
  TODOS.filter(noCargo).forEach(p=>{
    let dias = '', nPres = 0;
    DIAS.forEach(d=>{
      const on = ESCALA[d].includes(p);
      if(on) nPres++;
      dias += `<td><span class="day-dot ${on?'day-on':'day-off'}">${on?'P':'H'}</span></td>`;
    });
    body += `<tr><td class="name-cell">${avatar(p)}${p}</td><td><span class="cargo-badge">${CARGO[p]}</span></td>${dias}
      <td><b>${nPres}</b></td><td>${DIAS.length-nPres}</td></tr>`;
  });
  body += '</tbody>';
  document.getElementById('summaryTable').innerHTML = head + body;
}

renderTabs();
renderCargoFilter();
renderDia();
renderSummary();
</script>
</body>
</html>
